apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: demo
  labels:
    app: checkout-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: checkout-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
