apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: default
  labels:
    app: checkout-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
    spec:
      containers:
        - name: checkout-service
          image: checkout-service:demo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # "true" simulates the "add response caching for performance" deploy
            # that leaks memory; ArgoCD syncs this value from git.
            - name: ENABLE_RESPONSE_CACHE
              value: "true"
            - name: BASE_ERROR_RATE
              value: "0.01"
          resources:
            requests:
              cpu: "50m"
              memory: "100Mi"
            limits:
              cpu: "300m"
              memory: "200Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
