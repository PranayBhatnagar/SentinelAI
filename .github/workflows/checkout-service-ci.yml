name: checkout-service CI

on:
  push:
    branches: [main]
    paths:
      - "demo/checkout-service/**"
  pull_request:
    paths:
      - "demo/checkout-service/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo/checkout-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
      - run: docker build -t checkout-service:ci .
